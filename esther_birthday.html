<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Esther</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;

/* sunset glow */
background: radial-gradient(circle at center,
#ff9966,
#ff5e62,
#1a1a1a);
animation: glow 8s infinite alternate;
}

@keyframes glow{
0%{filter:brightness(1)}
100%{filter:brightness(1.3)}
}

.container{
max-width:700px;
padding:20px;
z-index:2;
}

input{
padding:12px;
font-size:16px;
border-radius:8px;
border:none;
width:220px;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#ff4d6d;
color:white;
cursor:pointer;
margin-top:10px;
}

#card{
display:none;
font-size:18px;
line-height:1.7;
}

h1{
color:#fff;
}

#error{
color:#ffbaba;
margin-top:10px;
}

/* confetti */
.confetti{
position:absolute;
width:8px;
height:8px;
background:white;
top:-10px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh);
}
}

</style>

</head>


<body>

<div class="container">

<div id="lock">

<h2>Enter Secret Code ❤️</h2>

<input id="pin" placeholder="Enter code">

<br>

<button onclick="unlock()">Unlock</button>

<p id="error"></p>

</div>


<div id="card">

<h1>Happy 18th Birthday Esther 🎉</h1>

<p id="message"></p>

</div>

</div>


<script>

/* unlock function */

function unlock(){

let pin=document.getElementById("pin").value.trim()

if(pin==="ESTHERLOVESHERSELF"){

document.getElementById("lock").style.display="none"
document.getElementById("card").style.display="block"

typeMessage()

}else{

document.getElementById("error").innerText="C’mon man you can do better 😂"

}

}


/* typing message */

let text=`Hey Essie pie ❤️

I just wanted to wish you more life, more happiness, more money, and success in everything you do. I’m always rooting for you even though we’re not together anymore.

I do miss you sometimes but we both know things can’t go back the way they were, so we’ll let it be. I’m really sorry for the ways I hurt you.

I truly hope the next guy you meet treats you right… and if he doesn’t, well… you know where to find me lol 😂✌🏼

Just know I’ll always want the best for you and I’ll always protect you as the good amazing lil dolphin that I am.

I’ll miss your shortness, your tiny lips, and those hard palms hehe 😂

Now that you’re 18, anything can happen — even jail 😭😂 so please be careful with the decisions you make and don’t get yourself into trouble okay!!!

Lowkey I once thought you’d come back and marry me someday… but life has its own plans I guess 🥲

Still, I’m grateful for the memories and the time we shared.

And about the sunset lamp… if I don’t get it for you I’m really sorry 😭🤲🏼

Enjoy your special day.
Stay amazing.

Love ya always my lil Essie pie ❤️

— Dolph 🐬
`

let i=0

function typeMessage(){

let speed=35

function typing(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i)

i++

setTimeout(typing,speed)

}

}

typing()

}


/* confetti generator */

for(let i=0;i<80;i++){

let confetti=document.createElement("div")

confetti.classList.add("confetti")

confetti.style.left=Math.random()*100+"vw"

confetti.style.animationDuration=(3+Math.random()*5)+"s"

confetti.style.backgroundColor=`hsl(${Math.random()*360},80%,60%)`

document.body.appendChild(confetti)

}

</script>


</body>
</html>
